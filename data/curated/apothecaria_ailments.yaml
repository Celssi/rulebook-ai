# Ailments by reputation tier — Apothecaria p.12–19
tiers:
  novice:
    '1':
      name: Wounded
      tags:
      - WOUND
      - PAIN
      timer: 6
      potency: 2
      description: 'Wounded - [WOUND ] [PAIN ] - Timer: 6 An extremely common occurrence. Whether it be by accident or from
        a duel, bandit ambush, or beast attack, the afflicted has a serious wound. Consequence: They are rushed to the village
        doctor. Lose 1 Reputation.'
      consequence: They are rushed to the village doctor. Lose 1 Reputation.
    '2':
      name: Phodothropy
      tags:
      - CURSE
      - HAIR
      timer: 6
      potency: 2
      description: 'Phodothropy – [CURSE ] [HAIR ] – Timer: 6 During the full moon, the afflicted turns into a monstrous hamster
        and scurries around their home and village, nibbling on carts and walls. Consequence: They go on another rampage.
        Lose 1 Reputation. Describe the aftermath.'
      consequence: They go on another rampage. Lose 1 Reputation. Describe the aftermath.
    '3':
      name: Druidic Madness
      tags:
      - SENSES
      - MAGIC
      timer: null
      potency: 2
      description: Druidic Madness - [SENSES ] [MAGIC ] After spending too much time near active stone circles, the afflicted
        has become obsessed with creating standing circles everywhere, obstructing traffic and annoying family.
      consequence: ''
    '4':
      name: Dragon Sickness
      tags:
      - SENSES
      - WOUND
      timer: 4
      potency: 2
      description: 'Dragon Sickness - [SENSES ] [WOUND ] - Timer: 4 Named after the champion hoarders themselves, the afflicted
        becomes obsessed with a type of object and tries to accrue the greatest hoard of it. Gold, cups, trading cards, etc.
        Consequence: The afflicted steals 10 Silver and runs away.'
      consequence: The afflicted steals 10 Silver and runs away.
    '5':
      name: Yeti Chest
      tags:
      - HAIR
      - LUNGS
      timer: null
      potency: 2
      description: Yeti Chest - [HAIR ] [LUNGS ] The afflicted’s chest hair grows longer and thicker until it becomes a fur-like
        coating. They also speak with a much lower voice for some reason. Good in Winter though.
      consequence: ''
    '6':
      name: Frogified
      tags:
      - WART
      - POISON
      timer: 6
      potency: 2
      description: 'Frogified - [WART ] [POISON ] - Timer: 6 After some clever clog wrote a story about kissing a frog and
        getting a prince, witches have had to deal with a flood of hopeless romantics getting warty lips and poisoned. Consequence:
        They’re rushed to the village doctor. Lose 1 Reputation.'
      consequence: They’re rushed to the village doctor. Lose 1 Reputation.
    '7':
      name: Baker’s Blisters
      tags:
      - BURN
      - PAIN
      timer: null
      potency: 2
      description: Baker’s Blisters - [BURN ] [PAIN ] Scalding hot sugar, time sensitive cakes, no oven gloves in sight, there’s
        a reason bakers say their blood, sweat, and tears went into their pastries.
      consequence: ''
    '8':
      name: Drunk
      tags:
      - BLOOD
      - COLD
      - SENSES
      timer: 8
      potency: 3
      description: 'Drunk - [BLOOD ] [COLD ] [SENSES ] - Timer: 8 Struck by a vampire, the afflicted has been drunk down to
        quite dangerous levels. On top of that, they keep leaving their window open at night now and have caught a cold. Consequence:
        They run off with their vampiric lover. Write about how it goes for them and for you. 13'
      consequence: They run off with their vampiric lover. Write about how it goes for them and for you. 13
    '9':
      name: Magnetic Thumb
      tags:
      - PAIN
      - BLOOD
      timer: null
      potency: 2
      description: Magnetic Thumb - [PAIN ] [BLOOD ] Caused by having too much iron in one’s diet, the afflicted’s hands attract
        metal. Not so bad for painters, a death sentence for builders and bakers.
      consequence: ''
    '10':
      name: Cludgie Mouth
      tags:
      - CURSE
      - INFECTION
      timer: 6
      potency: 2
      description: 'Cludgie Mouth - [CURSE ] [INFECTION ] - Timer: 6 A curse from a bog goblin, this poor soul’s mouth reeks
        like a tavern privy. A single breath of theirs can empty a busy room. Consequence: They go to the village doctor instead.
        Lose 1 Reputation.'
      consequence: They go to the village doctor instead. Lose 1 Reputation.
    jack:
      name: Hangover
      tags:
      - POISON
      - STOMACH
      timer: 4
      potency: 2
      description: 'Hangover - [POISON ] [STOMACH ] - Timer: 4 After a rowdy night of reckless abandon, the afflicted has
        crawled to you with a stomach full of poison, a mouth like a desert, and a head as fragile as a sparrow’s egg. Consequence:
        They get better and go off grumbling. Lose 1 Reputation.'
      consequence: They get better and go off grumbling. Lose 1 Reputation.
    queen:
      name: Toad Nose
      tags:
      - WARTS
      - MOOD
      timer: null
      potency: 2
      description: Toad Nose - [WARTS ] [MOOD ] Used to be that they called it Witch’s Nose. Thankfully enough people got
        turned into pigs for them to change it. Essentially just a wart, the afflicted might have more if unlucky.
      consequence: ''
    king:
      name: Pollen Pox
      tags:
      - RASH
      - COUGH
      timer: null
      potency: 2
      description: Pollen Pox - [RASH ] [COUGH ] Travellers from the cities often find that after spending a day in Glimmerwood
        Grove they’re suddenly itchy and sneezing. It’s always allergies. At this stage, you’ll get a lot of patients who
        aren’t in danger but who need a witch’s help to ease their discomfort. While there’s no rush, it does look good on
        you if cure them quickly. 14
      consequence: ''
  intermediate:
    '1':
      name: Spore Breath
      tags:
      - PARASITE
      - LUNGS
      - MOUTH
      timer: 6
      potency: 3
      description: 'Spore Breath - [PARASITE ] [LUNGS ] [MOUTH ] - Timer: 6 The afflicted has eaten a mushroom that they really
        shouldn’t have. Now, when they breathe, the spores are released in a noxious cloud. Consequence: They’ve infected
        everyone else in the village forcing other witches to get involved. What do the witches do? Lose 3 Reputation.'
      consequence: They’ve infected everyone else in the village forcing other witches to get involved. What do the witches
        do? Lose 3 Reputation.
    '2':
      name: Giver’s Disease
      tags:
      - SENSES
      - HOT
      - BURN
      timer: 6
      potency: 3
      description: 'Giver’s Disease - [SENSES ] [HOT ] [BURN ] - Timer: 6 The afflicted has become allergic to material possessions
        and has started giving away all of their worldly goods. If left untreated, leads to hypothermia, starvation, and boredom.
        Consequence: You took too long and they gave away everything. Lose 2 Reputation.'
      consequence: You took too long and they gave away everything. Lose 2 Reputation.
    '3':
      name: Candlesick
      tags:
      - EAR
      - BURN
      - HOT
      timer: 6
      potency: 3
      description: 'Candlesick - [EAR ] [BURN ] [HOT ] - Timer: 6 A nasty disease that causes the afflicted to produce half
        their weight in earwax each day. Burns go hand in hand with this affliction. Consequence: One of their earwax piles
        catches fire and burns something. What was it? Lose 2 Reputation.'
      consequence: One of their earwax piles catches fire and burns something. What was it? Lose 2 Reputation.
    '4':
      name: Shattered Tooth
      tags:
      - PAIN
      - TEETH
      - INFECTION
      timer: 6
      potency: 3
      description: 'Shattered Tooth - [PAIN ] [TEETH ] [INFECTION ] - Timer: 6 A fall, a punch, trying to open a tin with
        their teeth, the people of High Rannoc seem to be researching all the possible ways to break one’s teeth. The afflicted
        is just the latest. Consequence: They go to the village doctor instead. Lose 2 Reputation.'
      consequence: They go to the village doctor instead. Lose 2 Reputation.
    '5':
      name: Thunder Struck
      tags:
      - PAIN
      - NERVES
      - BURN
      timer: 6
      potency: 3
      description: 'Thunder Struck - [PAIN ] [NERVES ] [BURN ] - Timer: 6 Sometimes the gods get angry at certain people.
        Other times they were foolish enough to wear plate mail in a thunderstorm atop a mountain. Either way they’re in agony.
        Consequence: They pass on from their injuries. What were their last words? Lose 4 Reputation.'
      consequence: They pass on from their injuries. What were their last words? Lose 4 Reputation.
    '6':
      name: Partial Petrification
      tags:
      - MAGIC
      - SKIN
      - NERVES
      timer: 6
      potency: 3
      description: 'Partial Petrification - [MAGIC ] [SKIN ] [NERVES ] - Timer: 6 Cursed object, gorgon’s gaze, or a spell
        gone wrong, whatever the cause, a portion of the afflicted is uncomfortably petrified. Consequence: The petrified
        portion breaks off. What do they do with it? How does this affect them? Lose 2 Reputation.'
      consequence: The petrified portion breaks off. What do they do with it? How does this affect them? Lose 2 Reputation.
    '7':
      name: Phantom Limb
      tags:
      - SPIRIT
      - SLEEP
      timer: 6
      potency: 2
      description: 'Phantom Limb - [SPIRIT ] [SLEEP ] - Timer: 6 A genetic disorder that affects those with The Gift. The
        afflicted sprouts the ghostly limb of a deceased relative that they have no control over. Consequence: They learn
        to live with it, as much as it annoys other people. Lose 3 Reputation.'
      consequence: They learn to live with it, as much as it annoys other people. Lose 3 Reputation.
    '8':
      name: Hover Hives
      tags:
      - SKIN
      - PAIN
      timer: 6
      potency: 2
      description: 'Hover Hives - [SKIN ] [PAIN ] - Timer: 6 A dangerous ailment to those with less than solid roofs, tiny
        hives have appeared all over the afflicted that causes them to float. The more hives, the stronger the lift. Consequence:
        They float off into the sky and the Balloonist has to go fetch them. Lose 1 Reputation.'
      consequence: They float off into the sky and the Balloonist has to go fetch them. Lose 1 Reputation.
    '9':
      name: Ventriloquist Cough
      tags:
      - MAGIC
      - COUGH
      timer: 4
      potency: 2
      description: 'Ventriloquist Cough - [MAGIC ] [COUGH ] - Timer: 4 A rare ailment that sees the poor afflicted coughing
        someone else’s cough. They make the motions, ending up with a sore throat and dry mouth. Worst though is the thrown
        sound. Consequence: The puppet master gets over their cold and the afflicted goes home to lie down. Lose 2 Reputation.'
      consequence: The puppet master gets over their cold and the afflicted goes home to lie down. Lose 2 Reputation.
    '10':
      name: A Terrible Fright
      tags:
      - HAIR
      - PAIN
      - MOOD
      timer: 6
      potency: 3
      description: 'A Terrible Fright - [HAIR ] [PAIN ] [MOOD ] - Timer: 6 The afflicted has seen something so horrifying,
        so terrifying, so unbelievably scary that their hair has turned white and they’ve torn their throat from screaming.
        Consequence: They run off screaming. Are they ever found? Lose 1 Reputation.'
      consequence: They run off screaming. Are they ever found? Lose 1 Reputation.
    jack:
      name: Silver Burn
      tags:
      - CURSE
      - BURN
      timer: null
      potency: 2
      description: Silver Burn - [CURSE ] [BURN ] Silver is an irritant to more than just the stereotypical werewolf. The
        afflicted may have a form of lycanthropy, vampirism, or even a form of Giver’s Disease.
      consequence: ''
    queen:
      name: Tongue Stung
      tags:
      - MOUTH
      - BOILS
      - PAIN
      timer: null
      potency: 3
      description: Tongue Stung - [MOUTH ] [BOILS ] [PAIN ] The recent trend in ‘organic’ foods has led some clever clogs,
        the afflicted included, to try get their honey straight from the hive.
      consequence: ''
    king:
      name: Bard Boils
      tags:
      - BOILS
      - PAIN
      timer: 4
      potency: 2
      description: 'Bard Boils - [BOILS ] [PAIN ] - Timer: 4 Look, you have a duty of care to all who come to you, even if
        the affliction is… unseemly. Witch Elders also recommend smacking the bard responsible with an oak spoon. Consequence:
        They get embarrased and run off home to pretend this never happened. Lose 1 Reputation. Extra: If you make an extra
        potion and visit The Village within the Timer you may gain an extra 20 Silver from the bard. 16'
      consequence: They get embarrased and run off home to pretend this never happened. Lose 1 Reputation.
      extra: If you make an extra potion and visit The Village within the Timer you may gain an extra 20 Silver from the bard.
        16
