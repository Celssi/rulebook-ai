# Ashes journaling prompts by dungeon theme (PDF pp.86-179)
default_set: crypt
labels:
  spirit: Path of the Spirit
  earth: Path of the Earth
  ocean: Path of the Ocean
  flame: Path of the Flame
  storm: Path of the Storm
  crypt: Path of the Dead
  living: Path of the Living
  moon: Path of the Moon
  sun: Path of the Sun
  balance: Path of Balance
sets:
  spirit:
    hearts:
      ace:
        event: A spirit appears and points to strange symbols carved in the stone.
        check: INT Check
      '2':
        event: Misty faces whisper warnings. One asks for your blood in return.
        check: AGL Check
      '3':
        event: Carved faces watch from the walls. Warm light falls over you.
        check: Sanctuary (No Check)
      '4':
        event: An old door pulses with symbols. It wants to be opened.
        check: PWR Check
      '5':
        event: Shadows attack, their eyes pleading as they strike.
        check: PWR Check
      '6':
        event: A vision of the past fills your mind. Old allies lend their strength. INT Check
          (Gain 1 Lore on pass)
        check: No Check
      '7':
        event: A shifting maze opens ahead. Whispers offer to guide you through.
        check: INT Check
      '8':
        event: An altar glows. Unseen hands tend to your wounds.
        check: No Check
      '9':
        event: A spectral guardian stands over a treasure, measuring your worth.
        check: PWR Check
      '10':
        event: Thorik steps from the gloom, nodding as if he knew you would come.
        check: No Check
      jack:
        event: Darkness falls. Shapes rise from it, bound to guard this place.
        check: AGL Check
      queen:
        event: A blood-stained altar promises favour in exchange for an offering.
        check: Choose or Roll Item
      king:
        event: A ghostly figure sits on a throne in a faded hall, speaking of lost power.
          INT Check Hearts Prompts
        check: No Check
    diamonds:
      ace:
        event: A puzzle lock blocks your way. The answer lies in the constellations carved
          above.
        check: INT Check
      '2':
        event: Golden glyphs flare along the walls, ready to release their magic.
        check: AGL Check
      '3':
        event: A hidden alcove holds abandoned supplies, still humming with faint magic. Sanctuary
          (No
        check: Check)
      '4':
        event: A gem-encrusted door stands in your path. Force it open without shattering
          the stones.
        check: PWR Check
      '5':
        event: Treasure glitters ahead, but it is only illusion. Shadows stir to defend it.
        check: PWR Check
      '6':
        event: You touch a relic and memories not your own come flooding in. INT Check (Gain
          1 Lore on pass)
        check: No Check
      '7':
        event: The labyrinth walls are lined with gold, leading you deeper toward greater
          wealth.
        check: INT Check
      '8':
        event: A vault-like chamber offers rest, ringed by the treasures of fallen empires.
        check: No Check
      '9':
        event: Vault doors swing open, revealing untouched coins and artifacts. Pry loose
          what you can.
        check: PWR Check
      '10':
        event: Thorik sets up his shop, his wares sitting beside the ancient wealth of this
          place.
        check: No Check
      jack:
        event: Golden spectral guardians rise to attack, weighing your worth as they strike.
        check: AGL Check
      queen:
        event: An altar pulses with gemstones, calling for an offering.
        check: Choose or Roll Item
      king:
        event: A hall of ancient regalia stands before you, each piece telling of past glory
          and ruin. INT Check When Drawing Diamonds, Roll INT IF YOU PASS, ROLL FOR LOOT
        check: No Check
    clubs:
      ace:
        event: Animated statues draw their swords. Their movements follow a pattern you must
          read.
        check: INT Check
      '2':
        event: Pressure plates shift beneath your feet, loosing spectral spears from the walls.
