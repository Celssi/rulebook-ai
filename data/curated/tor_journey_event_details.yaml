# The One Ring 2e - Strider Mode, Journey Event Detail tables (pp.17-18, 25-26)
# Roll Success d6 after Feat d12 main event. Keys match event_type from main table.
terrible_misfortune:
  "1": {event: "Dire confrontation", outcome: "Noteworthy Encounter"}
  "2": {event: "Rival Predator", outcome: "HUNTING to avoid becoming the hunted"}
  "3": {event: "Violent weather", outcome: "EXPLORE to find shelter"}
  "4": {event: "Hidden hazard", outcome: "AWARENESS to avoid stumbling into danger"}
  "5": {event: "Dangerous terrain", outcome: "EXPLORE to find a safer route"}
  "6": {event: "Stalking enemy", outcome: "AWARENESS to spot the foul presence"}
despair:
