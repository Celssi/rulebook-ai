  "2": {event: "Torrential weather", outcome: "EXPLORE to find the least exposed path"}
  "3": {event: "Nightmarish presence", outcome: "AWARENESS to sense the danger"}
  "4": {event: "Fading vigour", outcome: "HUNTING to gain sustenance"}
  "5": {event: "Corrupted site", outcome: "EXPLORE to find your way out"}
  "6": {event: "Grisly scene or foreboding portent", outcome: "AWARENESS to be forewarned"}
