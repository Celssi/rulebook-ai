# The One Ring 2e - Strider Mode, Patron Quests (appendix pp.26-28)
patrons:
  balin:
    label: "Balin, Son of Fundin"
    quests:
      "1": "Dark whispers plague a Dwarven territory. What nameless Shadow lurks in the wilds?"
      "2": "This broken artifact could be a potent weapon against the enemy. What is this item, and who wields the skill to reforge it?"
      "3": "The Dwarven ruins hold great secrets — and weapons against the Enemy. What is the nature of these ruins, and what treasures do they hold?"
      "4": "A powerful comrade has fallen in battle against the Enemy. Who are they, and what did they carry vital to our survival?"
      "5": "A Dwarven stronghold now lies with the Enemy. Who leads these foul creatures, and how have they defiled our sacred site?"
      "6": "A powerful lieutenant of the Enemy grows in power. Who is this shadowy figure, and how have they amassed followers?"
  bilbo:
    label: "Bilbo Baggins"
    quests:
      "1": "This particular delicacy is a rare treat. What is this precious item, and where can it be found?"
      "2": "Scout the area and make a note of significant landmarks to aid cartography. How has the land changed?"
      "3": "The roads grow dark and perilous. What vital missive do you carry, and to whom must it be delivered?"
      "4": "An ancient text confounds attempts to decipher it. What is the nature of this text, and who possesses the knowledge to translate it?"
      "5": "The Enemy holds a map of special significance. What secrets does this map hold, and why is it vital?"
      "6": "An artifact of great importance has resurfaced. What is this item, and why must we find it before the enemy does?"
  cirdan:
    label: "Círdan the Shipwright"
    quests:
      "1": "Supplies wane as the Enemy draws near. What vital resource for the building of ships must you deliver?"
      "2": "An ancient enemy of the Elves has resurfaced and made themselves known. Who are they, and what grudge do they bear?"
      "3": "Hope falters in these dark days, so travel to a remote beacon and rekindle its flame. What shadowy presence seeks to prevent this?"
      "4": "Our missives fall into the hands of the Enemy. What fate befalls our messengers?"
      "5": "An artifact of great importance to the Elves is carried by a servant of the Enemy. Who is this creature, and why do they covet the artifact?"
      "6": "The ships of the Grey Havens are fashioned from sacred wood. What malady taints these trees?"
  gandalf:
    label: "Gandalf the Grey"
    quests:
      "1": "The people need hope in these dark times. Where is this remote settlement, and what good news do you bring?"
      "2": "Carry word of the Enemy's movements to our trusted ally. Who is this ally, and how can they aid us?"
      "3": "A possible ally has made themselves known to us. Who is this ally, and what must we do to earn their trust?"
      "4": "Our vision is clouded, our path uncertain. We must capture a servant of the Enemy. Who are they, and what do they know?"
      "5": "News has reached us of a terrible weapon the Enemy means to bear. What is this weapon, and who wields it?"
      "6": "The Shadow has captured an ally. Who is this ally, and where are they imprisoned?"
  gilraen:
    label: "Gilraen, Daughter of Dirhael"
    quests:
      "1": "A Ranger has gone missing. What has become of them?"
      "2": "A powerful servant of the Enemy lurks nearby. Who are they, and why do they target our Rangers?"
      "3": "Enemy patrols prowl along the road, targeting merchants and supply wagons. Who leads these deadly patrols?"
      "4": "A settlement has come under the eye of the Shadow. Why is this place significant?"
      "5": "Monstrous servants of the Enemy encroach. What manner of weapon do they carry?"
      "6": "We've received no word from a remote Ranger refuge. What fate has befallen our allies?"
  tom_goldberry:
    label: "Tom Bombadil and Lady Goldberry"
    quests:
      "1": "Creatures of the wilds have come under a dark affliction. What is this sickness, and what rare ingredient holds the key to a cure?"
      "2": "A sacred spring runs black with some malady of the Shadow. What taints this source, and what manner of foul creature guards it?"
      "3": "A group of travellers seeks escort through the wilds. Who are they, and what is their vital mission?"
      "4": "The Shadow corrupts a sacred site. What is this place, and what foul presence now taints it?"
      "5": "A precious flower blooms for the first time in many years. What is this plant, and why is it so vital?"
      "6": "An ancient, sacred tree hosts a foul presence. What is this shadow, and can it be purged?"
