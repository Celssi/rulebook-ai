    label: Pooh’s Golden Sigil
    effect: Pooh’s Golden Sigil. A symbol of friendship and adventures, glowing softly. ITEM TABLE In some exploration results on the surface world you will see the word ITEM. In these cases you can draw an additional card and consult the Item Table to see what you discover on your journey. It could be as insignificant as a pebble to the sigil of an old house. Remember, you can use these as prompts & come up with your own items! These are one-time use trinkets. Once the effect has been used up, they don’t disappear but no longer have the ability they came with so use them wisely. If you overcome a combat event using your ‘Overcome the Odds’ ability and get a Critical Success, your opponent will always drop an item! Any Heart or Diamond Encounter will also give you an item as a reward if you beat them. ITEMS
