    room: Broken Door
    check: PWR
  '5':
    room: Ambush
    check: COMBAT
  '6':
    room: Memory
    check: INT
  '7':
    room: Labyrinth
    check: INT
  '8':
    room: Sanctuary
    check: NO CHECK
  '9':
    room: Treasury
    check: AGL
  '10':
    room: Sanctuary & Merchant
    check: NO CHECK
  jack:
    room: Ambush
    check: INT & COMBAT
